<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>

                        "on-secondary-fixed": "#1d1b17",

                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-tertiary-container": "#710009",
                        "tertiary": "#ba1a20",

                        "secondary-fixed": "#e7e2db",

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-24 md:pb-0">
    <!-- Top Navigation -->
    <nav id="top-nav" class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-100">
    </nav>

    <!-- Mobile Bottom Navigation -->
    <div id="bottom-nav"
        class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white rounded-t-3xl z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-t">
    </div>

    <script src="js/customer-nav.js"></script>

    <!-- Main Content Canvas -->
    <main class="flex-grow pt-20 md:pt-28 px-4 md:px-8 max-w-container-max mx-auto w-full">
        <h1 class="font-display-lg text-on-background mb-8">سلة المشتريات</h1>
        <div class="flex flex-col lg:flex-row gap-8 items-start">
            <!-- Cart Items List -->
            <div class="w-full lg:w-2/3 flex flex-col gap-6" id="cart-items-container">
                <!-- Dynamic Cart Items -->
            </div>
            <!-- Sticky Order Summary -->
            <div class="w-full lg:w-1/3 lg:sticky lg:top-28">
                <div
                    class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_8px_30px_rgba(0,0,0,0.08)] flex flex-col gap-6">
                    <h2 class="font-headline-sm text-on-background border-b border-outline-variant pb-4">ملخص الطلب</h2>
                    <div class="flex flex-col gap-3 font-body-md text-on-surface-variant">
                        <div class="flex justify-between items-center">
                            <span>المجموع الفرعي</span>
                            <span class="text-on-background font-bold" id="subtotal">0 ريال</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span>رسوم التوصيل</span>
                            <span class="text-on-background font-bold" id="delivery-fee">0 ريال</span>
                        </div>
                    </div>
                    <div class="border-t border-outline-variant pt-4 flex justify-between items-center mt-2">
                        <span class="font-headline-sm text-on-background">الإجمالي</span>
                        <span class="font-display-md text-primary-container" id="total-price">0 ريال</span>
                    </div>
                    <button onclick="window.location.href='checkout.html'"
                        class="w-full bg-primary-container hover:bg-primary text-white font-label-lg rounded-lg py-4 flex items-center justify-center gap-2 transition-colors mt-4">
                        <span>إتمام الطلب</span>
                        <span class="material-symbols-outlined">arrow_back</span>
                    </button>
                    <div class="flex items-center justify-center gap-2 text-on-surface-variant font-label-sm mt-2">
                        <span class="material-symbols-outlined text-sm">lock</span>
                        <span>دفع آمن وموثوق</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- BottomNavBar (Mobile Only) -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full bg-white dark:bg-gray-900 rounded-t-3xl z-50 border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-around items-center px-4 pb-6 pt-3">
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="index.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">home</span>
            <span class="text-[12px] font-bold mt-1">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="menu.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu_book</span>
            <span class="text-[12px] font-bold mt-1">المنيو</span>
        </a>
        <a class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30 rounded-xl px-3 py-1 scale-105 transition-transform duration-200"
            href="cart.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
            <span class="text-[12px] font-bold mt-1">السلة</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="profile.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>
            <span class="text-[12px] font-bold mt-1">حسابي</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const summaryCard = document.querySelector('.lg\\:w-1\\/3');
            const cartContent = document.querySelector('.lg\\:flex-row');

            if (cart.length === 0) {
                summaryCard.style.display = 'none';
                document.querySelector('h1').style.display = 'none'; // Hide "Shopping Cart" title
                cartContent.classList.remove('flex-col', 'lg:flex-row');
                container.classList.remove('lg:w-2/3');
                container.classList.add('w-full');
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-center w-full">
                    <div class="w-64 h-64 mb-8 bg-orange-50 rounded-full flex items-center justify-center animate-pulse">
                        <span class="material-symbols-outlined text-[120px] text-primary/30">shopping_basket</span>
                    </div>
                    <h2 class="text-3xl font-black text-gray-900 mb-4">سلتك فارغة حالياً</h2>
                    <p class="text-gray-500 mb-8 max-w-sm text-lg">يبدو أنك لم تضف أي وجبات لذيذة بعد. ابدأ باستكشاف قائمة الطعام لدينا!</p>
                    <a href="menu.html" class="bg-primary text-white px-12 py-5 rounded-2xl font-bold shadow-xl shadow-orange-100 hover:bg-primary-container transition-all hover:scale-105 active:scale-95">
                        تصفح المنيو الآن
                    </a>
                </div>
            `;
                return;
            }

            summaryCard.style.display = 'block';
            document.querySelector('h1').style.display = 'block';
            container.classList.add('lg:w-2/3');
            cartContent.classList.add('flex-col', 'lg:flex-row');

            container.innerHTML = cart.map(item => `
            <div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_4px_20px_rgba(0,0,0,0.05)] flex flex-col sm:flex-row gap-4 relative group hover:scale-[1.01] transition-transform">
                <img src="${item.image_url || 'images/placeholder-food.jpg'}" alt="${item.name}" class="w-full sm:w-32 h-32 object-cover rounded-lg">
                <div class="flex-grow flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-headline-sm text-on-background">${item.name}</h3>
                        </div>
                        <button onclick="removeFromCart(${item.product_id})" class="text-error hover:text-error-container transition-colors p-2 -mr-2 -mt-2">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                    <div class="flex justify-between items-end mt-4">
                        <div class="font-display-md text-primary-container">${item.price} ريال</div>
                        <div class="flex items-center bg-surface-container rounded-lg border border-outline-variant">
                            <button onclick="updateQuantity(${item.product_id}, 1)" class="p-2 text-primary hover:bg-surface-container-high rounded-r-lg transition-colors">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                            <span class="px-4 font-label-lg text-on-background">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.product_id}, -1)" class="p-2 text-primary hover:bg-surface-container-high rounded-l-lg transition-colors">
                                <span class="material-symbols-outlined text-sm">remove</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
            updateSummary();
        }

        async function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('subtotal').innerText = `${subtotal} ريال`;

            try {
                const user = JSON.parse(localStorage.getItem('mazaki_user'));
                let delivery = 0;

                // Try to get zone-specific fee first
                const zoneRes = await fetch('/api/delivery-zones');
                const zones = await zoneRes.json();
                const userZone = user ? zones.find(z => z.zone_name === user.delivery_zone) : null;

                if (userZone) {
                    // Check if eligible for free delivery
                    if (subtotal >= userZone.free_delivery_minimum) {
                        delivery = 0;
                    } else {
                        delivery = userZone.delivery_fee;
                    }
                } else {
                    // Fallback to global setting if no user zone
                    const settingsRes = await fetch('/api/settings');
                    const settings = await settingsRes.json();
                    delivery = settings.delivery_fee || 0;
                }

                document.getElementById('delivery-fee').innerText = `${delivery} ريال`;
                document.getElementById('total-price').innerText = `${subtotal + delivery} ريال`;
            } catch (err) { console.error(err); }
        }

        // Wrap removeFromCart and updateQuantity to re-render
        const originalRemove = removeFromCart;
        removeFromCart = (id) => {
            originalRemove(id);
            renderCart();
        }
        const originalUpdate = updateQuantity;
        updateQuantity = (id, delta) => {
            const item = cart.find(i => i.product_id === id);
            if (item) {
                const newQty = Math.max(1, item.quantity + delta);
                originalUpdate(id, newQty);
                renderCart();
            }
        }
    </script>
</body>

</html>
