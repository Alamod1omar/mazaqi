<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>بوفية مذاقي - المنيو</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-primary-container": "#572800",
                        "surface-bright": "#f4faff",
                        "primary-fixed": "#ffdcc6",
                        "background": "#f4faff",
                        "secondary-fixed-dim": "#cbc6bf",
                        "surface": "#f4faff",
                        "on-secondary": "#ffffff",
                        "secondary": "#615e59",
                        "primary": "#964900",
                        "primary-fixed-dim": "#ffb786",
                        "surface-container-highest": "#d7e4ec",
                        "on-secondary-container": "#67645f",
                        "on-secondary-fixed-variant": "#494642",
                        "on-surface-variant": "#574235",
                        "surface-variant": "#d7e4ec",
                        "on-background": "#111d23",
                        "primary-container": "#f57c00",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#ffb786",
                        "on-tertiary-fixed-variant": "#930010",
                        "on-tertiary-fixed": "#410003",
                        "surface-tint": "#964900",
                        "outline": "#8b7263",
                        "on-primary-fixed": "#311300",
                        "inverse-surface": "#263238",
                        "surface-dim": "#cfdce4",
                        "surface-container": "#e3f0f8",
                        "secondary-container": "#e7e2db",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#e6f3fb",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#e9f6fd",
                        "surface-container-high": "#ddeaf2",
                        "outline-variant": "#dec1af",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#723600",
                        "on-secondary-fixed": "#1d1b17",
                        "tertiary-fixed": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-tertiary-container": "#710009",
                        "tertiary": "#ba1a20",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#e7e2db",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#ff7067",
                        "on-surface": "#111d23"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "1rem",
                        "container-max": "1200px",
                        "section-gap": "4rem",
                        "stack-sm": "0.5rem",
                        "stack-md": "1rem",
                        "gutter": "1.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Almarai"],
                        "body-md": ["Almarai"],
                        "display-md": ["Almarai"],
                        "headline-sm": ["Almarai"],
                        "display-lg": ["Almarai"],
                        "label-lg": ["Almarai"],
                        "label-sm": ["Almarai"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "label-lg": ["14px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Almarai', sans-serif;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col pb-24 md:pb-0">
    <!-- Top Navigation -->
    <nav id="top-nav" class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-100">
    </nav>

    <!-- Mobile Bottom Navigation -->
    <div id="bottom-nav"
        class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white rounded-t-3xl z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-t">
    </div>

    <script src="js/customer-nav.js"></script>
    <!-- Main Content Area -->
    <main
        class="flex-grow max-w-[1200px] mx-auto w-full px-4 md:px-6 pt-20 md:pt-[100px] pb-section-gap flex flex-col md:flex-row gap-gutter">
        <!-- Sidebar / Filters (Right Side) -->
        <aside class="w-full md:w-1/4 flex-shrink-0 space-y-6">
            <h1 class="font-display-lg text-display-lg text-on-background mb-4 hidden md:block">منيو بوفية مذاقي</h1>
            <div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-4 md:p-6 overflow-hidden">
                <h3 class="font-headline-sm text-headline-sm text-on-surface mb-4 hidden md:block">التصنيفات</h3>
                <div class="overflow-x-auto pb-2 -mx-4 px-4 md:mx-0 md:px-0 scrollbar-hide">
                    <ul class="flex md:flex-col gap-2 font-body-md text-body-md text-on-surface-variant whitespace-nowrap md:whitespace-normal" id="categories-list">
                        <li class="shrink-0 md:shrink">
                            <label class="flex items-center gap-3 cursor-pointer group bg-gray-50 md:bg-transparent px-4 py-2 md:p-0 rounded-full md:rounded-none">
                                <input checked="" class="hidden md:block text-primary focus:ring-primary h-5 w-5 border-outline-variant"
                                    name="category" type="radio" value="all" onchange="filterByCategory('all')" />
                                <span class="group-hover:text-primary transition-colors font-bold text-primary">الكل</span>
                            </label>
                        </li>
                        <!-- Dynamic Categories -->
                    </ul>
                </div>
            </div>
        </aside>
        <!-- Product Grid Area -->
        <section class="w-full md:w-3/4 flex flex-col gap-6">
            <!-- Mobile Title & Sorting -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-2">
                <h1 class="font-display-lg text-display-lg text-on-background md:hidden">منيو بوفية مذاقي</h1>
                <div class="w-full sm:w-auto relative flex-grow max-w-md hidden md:block">
                    <span
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined"
                        data-icon="search">search</span>
                    <input id="product-search"
                        class="w-full pl-4 pr-10 py-3 rounded-lg bg-surface-container-lowest border-none shadow-[0_4px_20px_rgba(0,0,0,0.05)] focus:ring-2 focus:ring-primary focus:outline-none font-body-md text-body-md text-on-surface"
                        placeholder="ابحث عن وجبتك المفضلة..." type="text" oninput="filterProducts()" />
                </div>
                <div class="w-full sm:w-auto flex items-center gap-2">
                    <span class="font-label-lg text-label-lg text-on-surface-variant whitespace-nowrap">ترتيب
                        حسب:</span>
                    <select id="sort-select"
                        class="bg-surface-container-lowest border-none shadow-[0_4px_20px_rgba(0,0,0,0.05)] rounded-lg py-2 pl-8 pr-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:outline-none cursor-pointer"
                        onchange="filterProducts()">
                        <option value="popular">الأكثر مبيعاً</option>
                        <option value="low">السعر: من الأقل للأعلى</option>
                        <option value="high">السعر: من الأعلى للأقل</option>
                    </select>
                </div>
            </div>
            <!-- Grid -->
            <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-gutter" id="products-container">
                <!-- Dynamic Products -->
            </div>
        </section>
    </main>
    <!-- Bottom Navigation Bar (Mobile Only) -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white dark:bg-gray-900 rounded-t-3xl z-50 border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="index.html">
            <span class="material-symbols-outlined" data-icon="home">home</span>
            <span class="text-[12px] font-bold mt-1">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/30 rounded-xl px-3 py-1 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="menu.html">
            <span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
            <span class="text-[12px] font-bold mt-1">المنيو</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="cart.html">
            <span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
            <span class="text-[12px] font-bold mt-1">السلة</span>
        </a>
        <a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 active:bg-gray-50 scale-105 transition-transform duration-200"
            href="profile.html">
            <span class="material-symbols-outlined" data-icon="person">person</span>
            <span class="text-[12px] font-bold mt-1">حسابي</span>
        </a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        let allProducts = [];
        let currentCategory = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const catId = urlParams.get('category');
            if (catId) currentCategory = catId;
            const search = urlParams.get('search');
            if (search) document.getElementById('product-search').value = search;

            await loadCategories();
            await loadProducts();
            updateCartCount();
        });

        async function loadCategories() {
            const res = await fetch('/api/categories');
            const categories = await res.json();
            const container = document.getElementById('categories-list');
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = 'shrink-0 md:shrink';
                li.innerHTML = `
                <label class="flex items-center gap-3 cursor-pointer group bg-gray-50 md:bg-transparent px-4 py-2 md:p-0 rounded-full md:rounded-none">
                    <input class="hidden md:block text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="category" type="radio" value="${cat.id}" ${currentCategory == cat.id ? 'checked' : ''} onchange="filterByCategory('${cat.id}')"/>
                    <span class="group-hover:text-primary transition-colors ${currentCategory == cat.id ? 'font-bold text-primary' : ''}">${cat.name}</span>
                </label>
            `;
                container.appendChild(li);
            });
        }

        async function loadProducts() {
            const res = await fetch('/api/products');
            allProducts = await res.json();
            await fetchActiveOffers();
            filterProducts();
        }

        function filterByCategory(id) {
            currentCategory = id;
            document.querySelectorAll('#categories-list span').forEach(s => s.classList.remove('font-bold', 'text-primary'));
            const activeSpan = document.querySelector(`input[value="${id}"]`).nextElementSibling;
            activeSpan.classList.add('font-bold', 'text-primary');
            filterProducts();
        }

        function filterProducts() {
            const searchTerm = document.getElementById('product-search').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;
            const container = document.getElementById('products-container');

            let filtered = allProducts.filter(p => {
                const matchesCat = currentCategory === 'all' || p.category_id == currentCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchTerm) || p.description.toLowerCase().includes(searchTerm);
                return matchesCat && matchesSearch;
            });

            if (sort === 'low') filtered.sort((a, b) => a.price - b.price);
            else if (sort === 'high') filtered.sort((a, b) => b.price - a.price);
            else if (sort === 'popular') filtered.sort((a, b) => (b.is_popular ? 1 : 0) - (a.is_popular ? 1 : 0));

            container.innerHTML = filtered.map(prod => {
                const isFav = isFavorite(prod.id);
                const offer = getProductDiscount(prod.id);
                const finalPrice = offer ? calculateDiscountedPrice(prod.price, offer.discount_percent) : prod.price;

                return `
                <article class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.1)] hover:scale-[1.02] transition-all duration-300 flex flex-col relative group">
                    <button onclick="toggleFavorite(${prod.id})" data-fav-id="${prod.id}" class="absolute top-3 left-3 z-10 p-1.5 bg-white/80 backdrop-blur-sm rounded-full text-on-surface-variant hover:text-error transition-all shadow-sm">
                        <span class="material-symbols-outlined text-lg" style="${isFav ? 'color: #ba1a1a; font-variation-settings: \'FILL\' 1;' : ''}">${isFav ? 'favorite' : 'favorite_border'}</span>
                    </button>
                    ${offer ? `<div class="absolute top-3 right-3 z-10 px-2 py-0.5 bg-primary text-white font-black text-[9px] rounded-full shadow-lg">خصم ${offer.discount_percent}%</div>` : ''}
                    ${!prod.is_available && !offer ? '<div class="absolute top-3 right-3 z-10 px-2 py-0.5 bg-error-container text-on-error-container font-black text-[9px] rounded-full">غير متوفر</div>' : ''}
                    <div class="aspect-[4/3] w-full bg-surface-variant relative overflow-hidden ${!prod.is_available ? 'grayscale-[50%]' : ''}">
                        <img class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500" src="${prod.image_url || 'images/placeholder-food.jpg'}" alt="${prod.name}">
                    </div>
                    <div class="p-3 md:p-4 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-1 md:mb-2">
                            <h2 class="font-bold text-sm md:text-headline-sm text-on-surface line-clamp-1">${prod.name}</h2>
                        </div>
                        <p class="text-[10px] md:text-body-sm text-on-surface-variant mb-2 md:mb-4 line-clamp-2 flex-grow">${prod.description}</p>
                        <div class="flex justify-between items-center mt-auto pt-3 md:pt-4 border-t border-surface-container-high">
                            <div class="flex flex-col">
                                ${offer ? `<span class="text-[9px] md:text-xs text-gray-400 line-through">${prod.price} ريال</span>` : ''}
                                <span class="font-bold text-sm md:text-display-md text-primary">${finalPrice.toFixed(2)} ريال</span>
                            </div>
                            <button class="bg-primary hover:bg-primary-container text-on-primary font-bold text-xs md:text-label-lg h-10 md:h-12 px-3 md:px-4 rounded-lg flex items-center justify-center gap-1 transition-colors" ${!prod.is_available ? 'disabled style="opacity:0.5"' : ''} onclick="addToCart(${prod.id}, '${prod.name.replace(/'/g, "\\'")}', ${finalPrice}, '${prod.image_url}')">
                                <span class="material-symbols-outlined text-[16px] md:text-[20px]" data-icon="${prod.is_available ? 'add' : 'block'}">${prod.is_available ? 'add' : 'block'}</span>
                                <span class="hidden sm:inline">${prod.is_available ? 'إضافة' : 'غير متوفر'}</span>
                            </button>
                        </div>
                    </div>
                </article>
            `;
            }).join('');
        }
    </script>
</body>

</html>
