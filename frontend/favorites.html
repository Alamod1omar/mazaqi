<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>المفضلة - بوفية مذاقي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#964900",
                        "primary-container": "#f57c00",
                        "background": "#f4faff",
                        "on-background": "#111d23",
                        "surface": "#ffffff",
                        "on-surface": "#111d23",
                        "on-surface-variant": "#574235",
                        "surface-container": "#e3f0f8",
                        "surface-container-low": "#e9f6fd",
                        "surface-container-highest": "#d7e4ec",
                        "surface-variant": "#d7e4ec",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Almarai', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col pt-20">
    <!-- Top Navigation -->
    <nav id="top-nav" class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-100"></nav>

    <!-- Mobile Bottom Navigation -->
    <div id="bottom-nav" class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white rounded-t-3xl z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-t"></div>

    <script src="js/customer-nav.js"></script>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 md:px-6 py-10">
        <div class="mb-10 text-center md:text-right">
            <h1 class="text-3xl font-black text-on-background mb-2">وجباتي المفضلة</h1>
            <p class="text-gray-500">هنا تجد جميع الوجبات التي نالت إعجابك.</p>
        </div>

        <div id="favorites-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Dynamic Favorites -->
            <div class="col-span-full py-20 text-center flex flex-col items-center">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-4xl text-gray-300">favorite</span>
                </div>
                <h3 class="text-xl font-bold text-gray-400">لا توجد وجبات في المفضلة بعد</h3>
                <a href="menu.html" class="mt-6 text-primary font-bold hover:underline">تصفح المنيو الآن</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-100 pb-24 md:pb-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 md:px-6 text-center">
            <div class="font-bold text-gray-900 text-xl mb-4">بوفية مذاقي</div>
            <p class="text-sm text-gray-500">© 2024 بوفية مذاقي. جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadFavorites();
            // Sync again to be sure if login just happened
            if (typeof syncFavorites === 'function') {
                await syncFavorites();
                loadFavorites(); // Re-render with synced data
            }
        });

        async function loadFavorites() {
            const container = document.getElementById('favorites-container');
            const favIds = typeof favorites !== 'undefined' ? favorites : (JSON.parse(localStorage.getItem('mazaki_favorites')) || []);
            
            if (favIds.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center flex flex-col items-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <span class="material-symbols-outlined text-4xl text-gray-300">favorite</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-400">لا توجد وجبات في المفضلة بعد</h3>
                        <a href="menu.html" class="mt-6 text-primary font-bold hover:underline">تصفح المنيو الآن</a>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch('/api/products');
                const allProducts = await res.json();
                const favoritedProducts = allProducts.filter(p => favIds.includes(p.id));

                if (favoritedProducts.length === 0) return;

                container.innerHTML = favoritedProducts.map(prod => `
                    <article class="bg-white rounded-3xl overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.1)] hover:-translate-y-1 transition-all duration-300 flex flex-col relative group border border-gray-50">
                        <button onclick="toggleFavoriteAndRefresh(${prod.id})" class="absolute top-3 left-3 z-10 p-2 bg-white/80 backdrop-blur-sm rounded-full text-red-500 shadow-sm">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
                        </button>
                        <div class="aspect-[4/3] w-full bg-gray-50 relative overflow-hidden">
                            <img class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500" src="${prod.image_url || 'images/placeholder-food.jpg'}" alt="${prod.name}">
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <h2 class="font-black text-on-background mb-1 text-lg">${prod.name}</h2>
                            <p class="text-gray-400 text-sm mb-6 line-clamp-2 flex-grow">${prod.description}</p>
                            <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-50">
                                <span class="font-black text-primary text-xl">${prod.price} ريال</span>
                                <button class="bg-primary hover:bg-primary-container text-white w-10 h-10 rounded-xl flex items-center justify-center transition-colors shadow-lg shadow-orange-100" onclick="addToCart(${prod.id}, '${prod.name.replace(/'/g, "\\'")}', ${prod.price}, '${prod.image_url}')">
                                    <span class="material-symbols-outlined text-[20px]">add</span>
                                </button>
                            </div>
                        </div>
                    </article>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function toggleFavoriteAndRefresh(id) {
            await toggleFavorite(id);
            loadFavorites();
        }
    </script>
</body>
</html>
