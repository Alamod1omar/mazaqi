<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>إدارة العروض - بوفية مذاقي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#f57c00",
                        "primary-container": "#e65100",
                        "background": "#f4faff",
                        "on-background": "#111d23",
                        "surface": "#ffffff",
                        "on-surface": "#111d23",
                        "on-surface-variant": "#574235",
                        "surface-container": "#e3f0f8",
                        "surface-container-low": "#e9f6fd",
                        "surface-dim": "#cfdce4",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Almarai', sans-serif; }
        .ambient-shadow { box-shadow: 0px 4px 20px rgba(0,0,0,0.05); }
        .input-focus-ring:focus { outline: none; border-color: #f57c00; box-shadow: 0 0 0 1px #f57c00; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        button { cursor: pointer; position: relative; z-index: 10; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex">
    <!-- SideNavBar -->
    <aside class="bg-gray-50 dark:bg-gray-950 font-sans text-sm font-medium h-screen w-64 border-l border-gray-200 dark:border-gray-800 hidden md:flex flex-col fixed right-0 top-0 h-full z-40">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800">
            <h1 class="text-xl font-black text-gray-900 dark:text-white">بوفية مذاقي</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">لوحة الإدارة</p>
        </div>
        <nav class="flex-1 py-4 flex flex-col gap-2 overflow-y-auto" id="admin-nav">
            <!-- JS filled -->
        </nav>
    </aside>

    <script src="../js/admin-sidebar.js"></script>
    <!-- Main Content -->
    <main class="flex-1 md:mr-64 w-full min-h-screen">
        <header class="bg-white border-b py-4 px-6 sticky top-0 z-30 flex items-center justify-between md:hidden mb-6">
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminSidebar()" class="text-gray-600">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 class="text-xl font-bold">إدارة العروض</h2>
            </div>
        </header>

        <div class="p-6 md:p-10">
            <div class="mb-10 hidden md:block">
                <h1 class="text-3xl font-black text-gray-900 mb-2">إدارة العروض</h1>
                <p class="text-gray-500">تحكم في الخصومات، الكوبونات، وعروض المنتجات</p>
            </div>
        <!-- Search & Filters -->
        <div class="bg-white rounded-2xl p-4 ambient-shadow border border-gray-50 flex flex-col md:flex-row items-center gap-4 mb-10">
            <div class="relative flex-1 w-full">
                <input type="text" id="offer-search" oninput="window.filterOffers()" placeholder="البحث برمز أو اسم العرض..." class="w-full bg-surface-container-low border-none rounded-xl py-3 pr-12 text-sm input-focus-ring transition-all">
                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
            </div>
            <div class="flex items-center gap-2 p-1 bg-surface-container-low rounded-xl overflow-x-auto no-scrollbar w-full md:w-auto">
                <button onclick="window.setFilter('الكل')" class="filter-btn flex-1 md:flex-none px-6 py-2 rounded-lg bg-white text-primary text-sm font-bold shadow-sm whitespace-nowrap transition-all">الكل</button>
                <button onclick="window.setFilter('نشط')" class="filter-btn flex-1 md:flex-none px-6 py-2 rounded-lg text-gray-500 text-sm font-bold whitespace-nowrap hover:bg-white transition-all">نشط</button>
                <button onclick="window.setFilter('مجدول')" class="filter-btn flex-1 md:flex-none px-6 py-2 rounded-lg text-gray-500 text-sm font-bold whitespace-nowrap hover:bg-white transition-all">مجدول</button>
                <button onclick="window.setFilter('منتهي')" class="filter-btn flex-1 md:flex-none px-6 py-2 rounded-lg text-gray-500 text-sm font-bold whitespace-nowrap hover:bg-white transition-all">منتهي</button>
            </div>
            <button onclick="window.showOfferModal()" class="w-full md:w-auto bg-primary text-white rounded-xl px-6 py-3 flex items-center justify-center gap-2 shadow-lg shadow-orange-100 hover:bg-primary-container transition-all active:scale-95 font-bold whitespace-nowrap">
                <span class="material-symbols-outlined">add</span>
                إضافة عرض
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="offers-grid">
            <!-- Dynamic Cards -->
        </div>
    </main>

    <!-- Offer Modal -->
    <div id="offer-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-2xl p-8 ambient-shadow max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black" id="modal-title">إضافة عرض جديد</h3>
                <button onclick="window.closeOfferModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="offer-form" class="space-y-6">
                <input type="hidden" id="offer-id">
                
                <div class="bg-orange-50/50 p-6 rounded-2xl border border-orange-100 mb-8">
                    <label class="text-xs font-black text-orange-600 uppercase tracking-widest block mb-4">نوع العرض</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="offer-type" value="coupon" checked class="sr-only peer" onchange="window.toggleTypeFields()">
                            <div class="p-4 bg-white border-2 border-gray-100 rounded-xl text-center peer-checked:border-primary peer-checked:bg-orange-50 transition-all">
                                <span class="material-symbols-outlined block mb-1">confirmation_number</span>
                                <span class="text-xs font-bold">كود خصم</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="offer-type" value="product" class="sr-only peer" onchange="window.toggleTypeFields()">
                            <div class="p-4 bg-white border-2 border-gray-100 rounded-xl text-center peer-checked:border-primary peer-checked:bg-orange-50 transition-all">
                                <span class="material-symbols-outlined block mb-1">restaurant</span>
                                <span class="text-xs font-bold">خصم منتج</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="title-field" class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-xs font-bold text-gray-400">عنوان العرض</label>
                        <input id="offer-title" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full" type="text" placeholder="مثال: خصم خاص لعملاء المتجر"/>
                    </div>
                    
                    <div id="product-field" class="flex flex-col gap-2 md:col-span-2 hidden">
                        <label class="text-xs font-bold text-gray-400">اختر المنتج</label>
                        <select id="offer-product-id" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full">
                            <option value="">اختر المنتج...</option>
                        </select>
                    </div>

                    <div id="code-field" class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400">كود العرض</label>
                        <input id="offer-code" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full uppercase" type="text" placeholder="SUMMER25"/>
                    </div>

                    <div id="discount-field" class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400">نسبة الخصم (%)</label>
                        <input id="offer-discount" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full" type="number" min="1" max="100" placeholder="25"/>
                    </div>

                    <div id="min-order-field" class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400">الحد الأدنى للطلب (ر.س)</label>
                        <input id="offer-min-order" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full" type="number" placeholder="50"/>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400">تاريخ الانتهاء</label>
                        <input id="offer-end-date" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full" type="date"/>
                    </div>

                    <div id="description-field" class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-xs font-bold text-gray-400">الوصف</label>
                        <textarea id="offer-description" class="bg-gray-50 border-none rounded-xl p-4 font-body-md text-on-background input-focus-ring w-full" rows="2" placeholder="اكتب تفاصيل العرض..."></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-6">
                    <button type="submit" class="flex-1 bg-primary text-white py-4 rounded-2xl font-black hover:bg-primary-container transition-all shadow-xl shadow-orange-100 active:scale-95">حفظ العرض</button>
                    <button type="button" onclick="window.closeOfferModal()" class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-black hover:bg-gray-200 transition-all active:scale-95">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/app.js?v=1.2"></script>
    <script src="../js/admin-sidebar.js?v=1.2"></script>
    <script>
        let allOffers = [];
        let allProducts = [];
        let currentFilter = 'الكل';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!isAdmin()) return window.location.href = 'login.html';
            await loadProducts();
            await window.loadOffers();
        });

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                allProducts = await res.json();
                const select = document.getElementById('offer-product-id');
                if(select) {
                    select.innerHTML = '<option value="">اختر المنتج...</option>' + 
                        allProducts.map(p => `<option value="${p.id}">${p.name} (${p.price} ر.س)</option>`).join('');
                }
            } catch (err) { console.error(err); }
        }

        window.loadOffers = async function() {
            try {
                const res = await fetch('/api/offers', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
                });
                allOffers = await res.json();
                window.filterOffers();
            } catch (err) { console.error(err); }
        }

        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText === filter) {
                    btn.classList.add('bg-white', 'text-primary', 'shadow-sm');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                    btn.classList.add('text-gray-500');
                }
            });
            window.filterOffers();
        }

        window.filterOffers = function() {
            const query = document.getElementById('offer-search').value.toLowerCase();
            let filtered = allOffers.filter(o => 
                (o.title && o.title.toLowerCase().includes(query)) || 
                (o.code && o.code.toLowerCase().includes(query))
            );

            if (currentFilter !== 'الكل') {
                filtered = filtered.filter(o => getOfferStatus(o) === currentFilter);
            }
            renderOffers(filtered);
        }

        function getOfferStatus(offer) {
            const now = new Date();
            const end = offer.end_date ? new Date(offer.end_date) : null;
            if (end && now > end) return 'منتهي';
            return offer.is_active ? 'نشط' : 'متوقف';
        }

        function renderOffers(offers) {
            const grid = document.getElementById('offers-grid');
            if (!grid) return;

            if (offers.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-gray-100">
                        <span class="material-symbols-outlined text-6xl text-gray-200 mb-4">local_offer</span>
                        <p class="text-gray-400 font-bold">لا توجد عروض تفي بالبحث</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = offers.map(offer => {
                const isProduct = !!offer.product_id;
                const product = isProduct ? allProducts.find(p => p.id == offer.product_id) : null;
                
                const typeIcon = isProduct ? 'restaurant' : 'confirmation_number';
                const typeColor = isProduct ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600';
                const typeName = isProduct ? 'خصم منتج' : 'كود خصم';

                return `
                <div class="bg-white rounded-3xl overflow-hidden ambient-shadow border border-gray-50 group hover:-translate-y-1 transition-all duration-300">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-6">
                            <div class="w-12 h-12 rounded-2xl ${typeColor} flex items-center justify-center">
                                <span class="material-symbols-outlined">${typeIcon}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.editOffer(${offer.id})" class="p-2 bg-gray-50 text-gray-400 hover:text-primary hover:bg-orange-50 rounded-xl transition-all">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </button>
                                <button onclick="window.deleteOffer(${offer.id})" class="p-2 bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                                    <span class="material-symbols-outlined text-sm">delete</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-wider ${typeColor}">${typeName}</span>
                                ${offer.is_active ? '<span class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-wider bg-green-50 text-green-600">نشط</span>' : '<span class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase tracking-wider bg-gray-50 text-gray-400">متوقف</span>'}
                            </div>
                            <h3 class="text-xl font-black text-gray-900 line-clamp-1">${isProduct ? (product ? product.name : 'منتج غير معروف') : (offer.title || 'عرض بدون عنوان')}</h3>
                            ${!isProduct && offer.description ? `<p class="text-xs text-gray-400 mt-1 line-clamp-2">${offer.description}</p>` : ''}
                        </div>

                        ${!isProduct ? `
                        <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-6 flex items-center justify-between group/code cursor-pointer active:scale-95 transition-all" onclick="window.copyCode('${offer.code}')">
                            <span class="font-mono font-black text-lg text-gray-800">${offer.code}</span>
                            <span class="material-symbols-outlined text-gray-300 text-sm">content_copy</span>
                        </div>
                        ` : ''}

                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-orange-50/30 p-3 rounded-2xl text-center border border-orange-50">
                                <p class="text-[10px] font-bold text-gray-400 mb-1">نسبة الخصم</p>
                                <p class="font-black text-lg text-primary">${offer.discount_percent || 0}%</p>
                            </div>
                            <div class="bg-gray-50/50 p-3 rounded-2xl text-center border border-gray-100">
                                <p class="text-[10px] font-bold text-gray-400 mb-1">${isProduct ? 'النوع' : 'الحد الأدنى'}</p>
                                <p class="font-black text-sm text-gray-700 truncate">${isProduct ? 'منتج واحد' : (offer.min_order_amount || 0) + ' ر.س'}</p>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-gray-50 flex items-center justify-between text-[10px] font-bold text-gray-400">
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px]">calendar_today</span>
                                ينتهي: ${offer.end_date ? new Date(offer.end_date).toLocaleDateString('ar-SA') : 'مفتوح'}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.toggleTypeFields = function() {
            const type = document.querySelector('input[name="offer-type"]:checked').value;
            const fields = {
                product: ['product-field', 'discount-field'],
                coupon: ['title-field', 'description-field', 'code-field', 'discount-field', 'min-order-field']
            };
            
            ['title-field', 'description-field', 'product-field', 'code-field', 'discount-field', 'min-order-field'].forEach(f => {
                const el = document.getElementById(f);
                if(el) el.classList.add('hidden');
            });
            
            fields[type].forEach(f => {
                const el = document.getElementById(f);
                if(el) el.classList.remove('hidden');
            });
            
            document.getElementById('offer-title').required = (type === 'coupon');
            document.getElementById('offer-product-id').required = (type === 'product');
            document.getElementById('offer-code').required = (type === 'coupon');
            document.getElementById('offer-discount').required = true;
        }

        window.showOfferModal = function() {
            document.getElementById('offer-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = 'إضافة عرض جديد';
            document.getElementById('offer-form').reset();
            document.getElementById('offer-id').value = '';
            window.toggleTypeFields();
        }

        window.closeOfferModal = function() {
            document.getElementById('offer-modal').classList.add('hidden');
        }

        window.copyCode = function(code) {
            navigator.clipboard.writeText(code).then(() => alert('تم نسخ الكود: ' + code));
        }

        window.toggleOfferStatus = async function(id, isActive) {
            try {
                await fetch(`/api/offers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` },
                    body: JSON.stringify({ is_active: isActive ? 1 : 0 })
                });
            } catch (err) { console.error(err); }
        }

        window.editOffer = function(id) {
            const offer = allOffers.find(o => o.id === id);
            if (!offer) return;
            
            window.showOfferModal();
            document.getElementById('modal-title').innerText = 'تعديل العرض';
            document.getElementById('offer-id').value = offer.id;
            document.getElementById('offer-title').value = offer.title || '';
            document.getElementById('offer-description').value = offer.description || '';
            document.getElementById('offer-discount').value = offer.discount_percent || '';
            document.getElementById('offer-end-date').value = offer.end_date ? offer.end_date.split('T')[0] : '';
            
            if (offer.product_id) {
                document.querySelector('input[name="offer-type"][value="product"]').checked = true;
                document.getElementById('offer-product-id').value = offer.product_id;
            } else {
                document.querySelector('input[name="offer-type"][value="coupon"]').checked = true;
                document.getElementById('offer-code').value = offer.code || '';
                document.getElementById('offer-min-order').value = offer.min_order_amount || 0;
            }
            window.toggleTypeFields();
        }

        window.deleteOffer = async function(id) {
            if (!confirm('هل أنت متأكد من حذف هذا العرض؟')) return;
            try {
                const res = await fetch(`/api/offers/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
                });
                if (res.ok) {
                    alert("تم حذف العرض بنجاح");
                    await window.loadOffers();
                } else {
                    const err = await res.json();
                    alert('فشل الحذف: ' + (err.message || 'خطأ غير معروف'));
                }
            } catch (err) { alert('خطأ في الاتصال بالخادم'); }
        }

        document.getElementById('offer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('offer-id').value;
            const type = document.querySelector('input[name="offer-type"]:checked').value;
            
            const data = {
                title: type === 'coupon' ? document.getElementById('offer-title').value : 'خصم منتج',
                description: type === 'coupon' ? document.getElementById('offer-description').value : 'خصم خاص على هذا المنتج',
                end_date: document.getElementById('offer-end-date').value,
                is_active: 1
            };

            if (type === 'coupon') {
                data.code = document.getElementById('offer-code').value.toUpperCase();
                data.discount_percent = parseInt(document.getElementById('offer-discount').value);
                data.min_order_amount = parseFloat(document.getElementById('offer-min-order').value) || 0;
            } else {
                data.product_id = parseInt(document.getElementById('offer-product-id').value);
                data.discount_percent = parseInt(document.getElementById('offer-discount').value);
            }

            try {
                const url = id ? `/api/offers/${id}` : '/api/offers';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` 
                    },
                    body: JSON.stringify(data)
                });
                if (res.ok) { 
                    window.closeOfferModal(); 
                    await window.loadOffers(); 
                } else {
                    const err = await res.json();
                    alert('خطأ: ' + (err.message || 'حدث خطأ غير معروف'));
                }
            } catch (err) { alert('خطأ في الاتصال بالخادم'); }
        });
    </script>
</body>
</html>
