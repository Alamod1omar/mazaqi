<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>إدارة التصنيفات - بوفية مذاقي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#f57c00",
                        "primary-container": "#e65100",
                        "background": "#f4faff",
                        "on-background": "#111d23",
                        "surface": "#ffffff",
                        "on-surface": "#111d23",
                        "on-surface-variant": "#574235",
                        "surface-container": "#e3f0f8",
                        "surface-container-low": "#e9f6fd",
                        "surface-dim": "#cfdce4",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Almarai', sans-serif; }
        .ambient-shadow { box-shadow: 0px 4px 20px rgba(0,0,0,0.05); }
        .input-focus-ring:focus { outline: none; border-color: #f57c00; box-shadow: 0 0 0 1px #f57c00; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .image-preview {
            width: 100%;
            height: 120px;
            border: 2px dashed #e2e8f0;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 1rem;
            position: relative;
            background: #f8fafc;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex">
    <!-- SideNavBar -->
    <aside class="bg-gray-50 dark:bg-gray-950 font-sans text-sm font-medium h-screen w-64 border-l border-gray-200 dark:border-gray-800 hidden md:flex flex-col fixed right-0 top-0 h-full z-40">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800">
            <h1 class="text-xl font-black text-gray-900 dark:text-white">بوفية مذاقي</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">لوحة الإدارة</p>
        </div>
        <nav class="flex-1 py-4 flex flex-col gap-2 overflow-y-auto" id="admin-nav">
            <!-- JS filled -->
        </nav>
    </aside>

    <script src="../js/admin-sidebar.js"></script>
    <!-- Main Content -->
    <main class="flex-1 md:mr-64 w-full min-h-screen">
        <header class="bg-white border-b py-4 px-6 sticky top-0 z-30 flex items-center justify-between md:hidden mb-6">
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminSidebar()" class="text-gray-600">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 class="text-xl font-bold">إدارة التصنيفات</h2>
            </div>
        </header>

        <div class="p-6 md:p-10">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                <div class="hidden md:block">
                    <h1 class="text-3xl font-black text-gray-900 mb-2">إدارة التصنيفات</h1>
                    <p class="text-gray-500">تحكم في أقسام المنيو وترتيب ظهورها</p>
                </div>
                <button onclick="openModal()" class="w-full md:w-auto bg-primary hover:bg-primary-container text-white px-6 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-orange-100 transition-all hover:-translate-y-0.5">
                    <span class="material-symbols-outlined">add</span>
                    إضافة تصنيف جديد
                </button>
            </header>

            <!-- Categories List -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="categories-grid">
                <!-- Dynamic Categories -->
            </div>
        </div>
    </main>

    <!-- Category Modal -->
    <div id="category-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-gray-900" id="modal-title">إضافة تصنيف</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-400">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="category-form" class="space-y-6">
                <input type="hidden" id="category-id">
                
                <div class="image-preview" id="image-preview-container">
                    <span class="text-gray-400 text-xs font-bold" id="preview-placeholder">صورة التصنيف</span>
                    <img src="" id="preview-img" class="hidden">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 mr-2">صورة التصنيف</label>
                    <input id="category-image-file" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer" onchange="previewFile()">
                    <input type="hidden" id="category-image-url">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 mr-2">اسم التصنيف</label>
                    <input id="category-name" required class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-900 focus:ring-2 focus:ring-primary transition-all" type="text" placeholder="مثال: الوجبات السريعة">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 mr-2">ترتيب الظهور</label>
                    <input id="category-sort" required class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-900 focus:ring-2 focus:ring-primary transition-all" type="number" value="1">
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 rounded-2xl font-bold text-gray-500 hover:bg-gray-50 transition-all">إلغاء</button>
                    <button type="submit" class="flex-1 bg-primary text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-orange-100 hover:bg-primary-container transition-all">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        let allCategories = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('mazaki_admin_token');
            if (!token) window.location.href = 'login.html';
            loadCategories();
        });

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                allCategories = await res.json();
                renderCategories();
            } catch (err) { console.error(err); }
        }

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            if (allCategories.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-gray-100">
                        <span class="material-symbols-outlined text-6xl text-gray-200 mb-4">category</span>
                        <p class="text-gray-400 font-bold">لا توجد تصنيفات حالياً</p>
                        <p class="text-gray-300 text-xs mt-1">ابدأ بإضافة أول تصنيف للمنيو الخاص بك</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = allCategories.map(cat => `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition-all group relative">
                    <div class="flex items-start justify-between mb-6">
                        <div class="w-16 h-16 bg-gray-50 rounded-2xl overflow-hidden shadow-inner">
                            <img src="${cat.image_url || '../images/placeholder-food.jpg'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='../images/placeholder-food.jpg'">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editCategory(${cat.id})" class="w-9 h-9 flex items-center justify-center bg-orange-50 text-orange-600 rounded-xl hover:bg-orange-600 hover:text-white transition-all shadow-sm">
                                <span class="material-symbols-outlined text-sm">edit</span>
                            </button>
                            <button onclick="deleteCategory(${cat.id})" class="w-9 h-9 flex items-center justify-center bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">نشط</span>
                        </div>
                        <h3 class="text-xl font-black text-gray-900 mb-1">${cat.name}</h3>
                        <div class="flex items-center gap-2 text-[10px] text-gray-400 font-bold">
                            <span class="material-symbols-outlined text-[14px]">sort</span>
                            الترتيب: ${cat.sort_order}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function previewFile() {
            const file = document.getElementById('category-image-file').files[0];
            const preview = document.getElementById('preview-img');
            const placeholder = document.getElementById('preview-placeholder');
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }

            if (file) {
                reader.readAsDataURL(file);
            } else {
                preview.src = "";
                preview.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        }

        function openModal(id = null) {
            const modal = document.getElementById('category-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('category-form');
            
            form.reset();
            document.getElementById('category-id').value = '';
            document.getElementById('preview-img').src = '';
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');
            
            if (id) {
                const cat = allCategories.find(c => c.id == id);
                title.innerText = 'تعديل التصنيف';
                document.getElementById('category-id').value = cat.id;
                document.getElementById('category-name').value = cat.name;
                document.getElementById('category-image-url').value = cat.image_url || '';
                document.getElementById('category-sort').value = cat.sort_order;
                
                if (cat.image_url) {
                    document.getElementById('preview-img').src = cat.image_url;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('preview-placeholder').classList.add('hidden');
                }
            } else {
                title.innerText = 'إضافة تصنيف';
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('category-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
        }

        document.getElementById('category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('category-id').value;
            const formData = new FormData();
            
            formData.append('name', document.getElementById('category-name').value);
            formData.append('sort_order', document.getElementById('category-sort').value);
            formData.append('is_active', 1);
            
            const fileInput = document.getElementById('category-image-file');
            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            } else {
                formData.append('image_url', document.getElementById('category-image-url').value);
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/categories/${id}` : '/api/categories';
            
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}`
                    },
                    body: formData
                });
                
                if (res.ok) {
                    showToast(id ? 'تم تحديث التصنيف' : 'تمت إضافة التصنيف');
                    closeModal();
                    loadCategories();
                } else {
                    alert('حدث خطأ أثناء الحفظ');
                }
            } catch (err) { console.error(err); }
        });

        async function editCategory(id) {
            openModal(id);
        }

        async function deleteCategory(id) {
            if (!confirm('هل أنت متأكد من حذف هذا التصنيف؟')) return;
            try {
                const res = await fetch(`/api/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
                });
                if (res.ok) {
                    showToast('تم حذف التصنيف');
                    loadCategories();
                }
            } catch (err) { console.error(err); }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-2xl font-bold z-[100] animate-bounce shadow-2xl';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
    <script src="../js/app.js?v=1.2"></script>
    <script src="../js/admin-sidebar.js?v=1.2"></script>
</body>
</html>
