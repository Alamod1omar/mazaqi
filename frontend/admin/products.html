<!DOCTYPE html>
<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إدارة المنتجات - بوفية مذاقي</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#574235",
                        "on-primary-container": "#572800",
                        "surface-bright": "#f4faff",
                        "primary-container": "#f57c00",
                        "primary": "#964900",
                        "on-surface": "#111d23",
                        "background": "#f4faff",
                        "surface": "#f4faff",
                        "on-background": "#111d23",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "body-md": ["Almarai"],
                        "display-md": ["Almarai"]
                    }
                }
            }
        }
    </script>
<style>
    body { font-family: 'Almarai', sans-serif; }
    .image-preview {
        width: 100%;
        height: 150px;
        border: 2px dashed #e2e8f0;
        border-radius: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-bottom: 1rem;
        position: relative;
    }
    .image-preview img {
        width: 100%;
        height: 100%;
        object-cover: cover;
    }
</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex">
<!-- SideNavBar -->
<aside class="bg-white dark:bg-slate-900 h-screen w-64 border-l border-slate-100 dark:border-slate-800 shadow-sm fixed right-0 top-0 h-screen flex flex-col p-4 z-40 hidden md:flex">
<div class="mb-8 px-4">
<h1 class="text-xl font-bold text-orange-600">بوفية مذاقي</h1>
<p class="text-slate-500 text-xs mt-1">Admin Panel</p>
</div>
<nav class="flex-1 py-4 flex flex-col gap-2 overflow-y-auto" id="admin-nav">
    <!-- JS filled -->
</nav>
<div class="mt-auto">
<button onclick="adminLogout()" class="w-full flex items-center gap-3 text-red-600 px-4 py-3 hover:bg-red-50 rounded-lg transition-all">
<span class="material-symbols-outlined">logout</span>
<span>خروج</span>
</button>
</div>
</aside>

<!-- Main Content Area -->
<div class="flex-1 md:mr-64 min-h-screen">
<header class="bg-white border-b py-4 px-6 md:px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-4">
        <button onclick="toggleAdminSidebar()" class="md:hidden text-gray-600">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <h2 class="text-xl font-bold">إدارة المنتجات</h2>
    </div>
    <button onclick="showAddModal()" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-orange-700 transition-colors flex items-center gap-2 shadow-md">
        <span class="material-symbols-outlined">add</span>
        إضافة منتج
    </button>
</header>
<main class="p-6 md:p-8 overflow-y-auto">
<div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Dynamic Cards -->
</div>
</main>
</div>

<!-- Add/Edit Product Modal -->
<div id="product-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto">
        <h3 id="modal-title" class="text-2xl font-bold mb-6">إضافة منتج جديد</h3>
        <form id="product-form" class="space-y-4">
            <input type="hidden" id="product-id">
            
            <div class="image-preview" id="image-preview-container">
                <span class="text-gray-400 text-sm" id="preview-placeholder">اضغط لاختيار صورة</span>
                <img src="" id="preview-img" class="hidden">
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">صورة المنتج</label>
                <input id="prod-image-file" type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer" onchange="previewFile()">
                <p class="text-[10px] text-gray-400 mt-1">يمكنك اختيار صورة من جهازك مباشرة</p>
                <!-- Hidden input for existing image URL -->
                <input type="hidden" id="prod-image-url">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold mb-1">اسم المنتج</label>
                    <input id="prod-name" required class="w-full border-gray-200 rounded-lg" type="text" placeholder="مثال: برجر دجاج">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">السعر</label>
                    <input id="prod-price" required class="w-full border-gray-200 rounded-lg" type="number" step="0.01" placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">التصنيف</label>
                <select id="prod-category" required class="w-full border-gray-200 rounded-lg"></select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">الوصف</label>
                <textarea id="prod-desc" class="w-full border-gray-200 rounded-lg" rows="2" placeholder="وصف المكونات أو الحجم..."></textarea>
            </div>
            
            <div class="flex items-center gap-2 bg-gray-50 p-3 rounded-xl border border-gray-100">
                <input id="prod-available" type="checkbox" checked class="rounded text-orange-600 focus:ring-orange-500">
                <label class="text-sm font-bold text-gray-700">متوفر في القائمة</label>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="closeModal()" class="px-6 py-2 rounded-lg border font-bold text-gray-500 hover:bg-gray-50">إلغاء</button>
                <button type="submit" class="bg-primary text-white px-8 py-2 rounded-lg font-bold hover:bg-primary-container shadow-lg shadow-orange-100">حفظ المنتج</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/admin-sidebar.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!isAdmin()) return window.location.href = 'login.html';
        await loadCategories();
        await loadProducts();
    });

    async function loadCategories() {
        const res = await fetch('/api/categories');
        const cats = await res.json();
        const select = document.getElementById('prod-category');
        select.innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    let allProducts = [];
    async function loadProducts() {
        const res = await fetch('/api/products');
        allProducts = await res.json();
        const grid = document.getElementById('products-grid');
        grid.innerHTML = allProducts.map(p => `
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 group relative hover:shadow-md transition-all">
                <div class="flex gap-4">
                    <img src="${p.image_url || '../images/placeholder-food.jpg'}" class="w-24 h-24 object-cover rounded-xl ${!p.is_available ? 'grayscale opacity-50' : ''}">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-gray-900 truncate">${p.name}</h3>
                            <span class="text-[10px] px-2 py-0.5 rounded-full font-bold shrink-0 ${p.is_available ? 'bg-green-50 text-green-600 border border-green-100' : 'bg-red-50 text-red-600 border border-red-100'}">
                                ${p.is_available ? 'متوفر' : 'غير متوفر'}
                            </span>
                        </div>
                        <p class="text-xs font-black text-orange-600 mt-1">${p.price} ريال</p>
                        <p class="text-[10px] text-gray-400 mt-1 line-clamp-1">${p.description || 'بدون وصف'}</p>
                        
                        <div class="flex gap-3 mt-3">
                            <button onclick="editProduct(${p.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition-colors">
                                <span class="material-symbols-outlined text-sm">edit</span>
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-100 transition-colors">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function previewFile() {
        const file = document.getElementById('prod-image-file').files[0];
        const preview = document.getElementById('preview-img');
        const placeholder = document.getElementById('preview-placeholder');
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }

        if (file) {
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.classList.add('hidden');
            placeholder.classList.remove('hidden');
        }
    }

    function showAddModal() {
        document.getElementById('modal-title').innerText = 'إضافة منتج جديد';
        document.getElementById('product-form').reset();
        document.getElementById('product-id').value = '';
        document.getElementById('preview-img').src = '';
        document.getElementById('preview-img').classList.add('hidden');
        document.getElementById('preview-placeholder').classList.remove('hidden');
        document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('product-modal').classList.add('hidden');
    }

    function editProduct(id) {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;
        document.getElementById('modal-title').innerText = 'تعديل المنتج';
        document.getElementById('product-id').value = p.id;
        document.getElementById('prod-name').value = p.name;
        document.getElementById('prod-price').value = p.price;
        document.getElementById('prod-category').value = p.category_id;
        document.getElementById('prod-desc').value = p.description;
        document.getElementById('prod-image-url').value = p.image_url;
        document.getElementById('prod-available').checked = p.is_available == 1;
        
        if (p.image_url) {
            document.getElementById('preview-img').src = p.image_url;
            document.getElementById('preview-img').classList.remove('hidden');
            document.getElementById('preview-placeholder').classList.add('hidden');
        } else {
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');
        }
        
        document.getElementById('product-modal').classList.remove('hidden');
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('product-id').value;
        const formData = new FormData();
        
        formData.append('name', document.getElementById('prod-name').value);
        formData.append('price', document.getElementById('prod-price').value);
        formData.append('category_id', document.getElementById('prod-category').value);
        formData.append('description', document.getElementById('prod-desc').value);
        formData.append('is_available', document.getElementById('prod-available').checked);
        
        const fileInput = document.getElementById('prod-image-file');
        if (fileInput.files[0]) {
            formData.append('image', fileInput.files[0]);
        } else {
            formData.append('image_url', document.getElementById('prod-image-url').value);
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/products/${id}` : '/api/products';

        try {
            const res = await fetch(url, {
                method,
                headers: { 
                    'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}`
                },
                body: formData
            });
            if (res.ok) {
                closeModal();
                loadProducts();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        } catch (err) { 
            console.error(err);
            alert('خطأ في حفظ المنتج'); 
        }
    });

    async function deleteProduct(id) {
        if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
        try {
            const res = await fetch(`/api/products/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
            });
            if (res.ok) loadProducts();
        } catch (err) { alert('خطأ في حذف المنتج'); }
    }
</script>
</body></html>
