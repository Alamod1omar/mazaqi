<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>بوفية مذاقي - إدارة الطلبات</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#964900",
                        "background": "#f4faff",
                        "surface": "#ffffff"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Almarai', sans-serif;
        }

        @media (max-width: 640px) {
            .hide-mobile { display: none !important; }
        }
    </style>
</head>

<body class="bg-background text-gray-800 min-h-screen flex">
    <aside
        class="bg-white h-screen w-64 border-l border-gray-100 fixed right-0 top-0 z-40 hidden md:flex flex-col shadow-xl overflow-y-auto">
        <div class="p-5 border-b border-gray-100 hidden md:block">
            <h1 class="text-xl font-black text-gray-900">بوفية مذاقي</h1>
            <p class="text-xs text-gray-400 mt-1">لوحة الإدارة</p>
        </div>
        <nav class="flex-1 py-4 flex flex-col gap-2 overflow-y-auto" id="admin-nav">
            <!-- JS filled -->
        </nav>
    </aside>
    <script src="../js/admin-sidebar.js"></script>

    <div class="flex-1 md:mr-64 min-h-screen flex flex-col overflow-x-hidden">
        <header class="bg-white/95 backdrop-blur-md border-b border-gray-100 py-4 px-4 md:px-6 sticky top-0 z-20 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="toggleAdminSidebar()" class="md:hidden text-gray-600 p-1">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 class="text-lg font-black text-gray-900">إدارة الطلبات</h2>
            </div>
        </header>
        <main class="p-4 md:p-8">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead class="bg-gray-50 text-xs font-bold border-b whitespace-nowrap text-gray-500">
                            <tr>
                                <th class="px-3 md:px-6 py-3 text-right hide-mobile">م</th>
                                <th class="px-3 md:px-6 py-3 text-right">رقم الطلب</th>
                                <th class="px-3 md:px-6 py-3 text-right">العميل</th>
                                <th class="px-3 md:px-6 py-3 text-right hide-mobile">التاريخ</th>
                                <th class="px-3 md:px-6 py-3 text-right">الإجمالي</th>
                                <th class="px-3 md:px-6 py-3 text-right">الحالة</th>
                                <th class="px-3 md:px-6 py-3 text-center">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="orders-list-body" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js?v=1.2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isAdmin()) return window.location.href = 'login.html';
            await loadAllOrders();

            // Auto-refresh every 30 seconds
            setInterval(loadAllOrders, 30000);
        });

        let allOrders = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadAllOrders() {
            try {
                const res = await fetch('/api/orders', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
                });
                allOrders = await res.json();
                renderOrders();
            } catch (err) { console.error(err); }
        }

        function renderOrders() {
            const container = document.getElementById('orders-list-body');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageOrders = allOrders.slice(start, end);

            const statusConfig = {
                'جديد': 'bg-blue-100 text-blue-800',
                'بانتظار التأكيد': 'bg-blue-100 text-blue-800',
                'قيد التحضير': 'bg-orange-100 text-orange-800',
                'قيد التوصيل': 'bg-purple-100 text-purple-800',
                'مكتمل': 'bg-green-100 text-green-800',
                'ملغي': 'bg-red-100 text-red-800'
            };

            container.innerHTML = pageOrders.map((ord, index) => {
                const statusClass = statusConfig[ord.status] || 'bg-gray-100 text-gray-800';
                return `
                <tr class="hover:bg-gray-50 transition-colors border-b border-gray-50">
                    <td class="px-3 md:px-6 py-3 text-gray-400 font-mono text-[10px] hide-mobile">${start + index + 1}</td>
                    <td class="px-3 md:px-6 py-3">
                        <div class="font-bold text-sm text-primary">#${ord.id.toString().slice(-6)}</div>
                    </td>
                    <td class="px-3 md:px-6 py-3">
                        <div class="font-bold text-sm text-gray-900 truncate max-w-[100px] md:max-w-none">${ord.customer_name}</div>
                        <div class="text-[10px] text-gray-500">${ord.customer_phone}</div>
                    </td>
                    <td class="px-3 md:px-6 py-3 text-gray-500 text-xs hide-mobile">${new Date(ord.created_at).toLocaleString('ar-SA')}</td>
                    <td class="px-3 md:px-6 py-3 font-black text-sm text-gray-900 whitespace-nowrap">${ord.total} ر.س</td>
                    <td class="px-3 md:px-6 py-3"><span class="px-2 py-0.5 rounded-lg text-[10px] font-black whitespace-nowrap ${statusClass}">${ord.status}</span></td>
                    <td class="px-3 md:px-6 py-3 text-center">
                        <a href="order-details.html?id=${ord.id}" class="inline-flex items-center justify-center w-8 h-8 rounded-xl bg-gray-50 text-gray-400 hover:bg-orange-50 hover:text-primary transition-all">
                            <span class="material-symbols-outlined text-sm">visibility</span>
                        </a>
                    </td>
                </tr>
            `;
            }).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allOrders.length / itemsPerPage);
            let paginationHtml = `
            <div class="flex items-center justify-center gap-2 p-4 border-t bg-gray-50/50">
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="p-2 rounded-lg hover:bg-gray-200 disabled:opacity-30">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
                <span class="text-sm font-bold">صفحة ${currentPage} من ${totalPages}</span>
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="p-2 rounded-lg hover:bg-gray-200 disabled:opacity-30">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
            </div>
        `;

            // Find or create pagination container
            let pagContainer = document.getElementById('pagination-container');
            if (!pagContainer) {
                pagContainer = document.createElement('div');
                pagContainer.id = 'pagination-container';
                document.querySelector('main').appendChild(pagContainer);
            }
            pagContainer.innerHTML = paginationHtml;
        }

        function changePage(page) {
            const totalPages = Math.ceil(allOrders.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderOrders();
        }

        async function deleteOrder(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الطلب؟')) return;
            try {
                const res = await fetch(`/api/orders/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('mazaki_admin_token')}` }
                });
                if (res.ok) loadAllOrders();
            } catch (err) { console.error(err); }
        }

        async function printOrder(id) {
            try {
                const res = await fetch(`/api/orders/${id}`);
                const order = await res.json();
                const printWindow = window.open('', '_blank', 'width=600,height=800');
                const itemsHtml = order.items.map(item => `
                <tr>
                    <td style="padding: 8px; border-bottom: 1px solid #eee;">${item.product_name}</td>
                    <td style="padding: 8px; border-bottom: 1px solid #eee; text-align: center;">${item.quantity}</td>
                    <td style="padding: 8px; border-bottom: 1px solid #eee; text-align: left;">${item.price} ريال</td>
                </tr>
            `).join('');

                printWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>طباعة طلب #${order.id}</title>
                    <style>
                        body { font-family: sans-serif; padding: 20px; }
                        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
                        .details { margin-bottom: 20px; }
                        table { width: 100%; border-collapse: collapse; }
                        .total { margin-top: 20px; text-align: left; font-weight: bold; font-size: 1.2em; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>بوفية مذاقي</h1>
                        <p>فاتورة طلب رقم: #${order.id.toString().padStart(10, '0')}</p>
                    </div>
                    <div class="details">
                        <p><strong>العميل:</strong> ${order.customer_name}</p>
                        <p><strong>الجوال:</strong> ${order.customer_phone}</p>
                        <p><strong>التاريخ:</strong> ${new Date(order.created_at).toLocaleString('ar-SA')}</p>
                        <p><strong>نوع الطلب:</strong> ${order.order_type === 'delivery' ? 'توصيل' : 'استلام من الفرع'}</p>
                        <p><strong>العنوان:</strong> ${order.address}</p>
                    </div>
                    <table>
                        <thead>
                            <tr style="background: #f5f5f5;">
                                <th style="padding: 8px; text-align: right;">المنتج</th>
                                <th style="padding: 8px;">الكمية</th>
                                <th style="padding: 8px; text-align: left;">السعر</th>
                            </tr>
                        </thead>
                        <tbody>${itemsHtml}</tbody>
                    </table>
                    <div class="total">
                        <p>المجموع الفرعي: ${order.subtotal} ريال</p>
                        <p>رسوم التوصيل: ${order.delivery_fee} ريال</p>
                        ${order.discount_amount ? `<p>الخصم: -${order.discount_amount} ريال</p>` : ''}
                        <hr>
                        <p>الإجمالي النهائي: ${order.total} ريال</p>
                    </div>
                    <script>
                        window.onload = function() { window.print(); window.close(); }
                    <\/script>
                </body>
                </html>
            `);
                printWindow.document.close();
            } catch (err) { console.error('Print error:', err); }
        }
    </script>
    <script src="../js/admin-sidebar.js?v=1.2"></script>
</body>

</html>
