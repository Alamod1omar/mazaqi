<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المسؤول - بوفية مذاقي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Almarai', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border-t-4 border-orange-600">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-orange-600 mb-2">لوحة التحكم</h1>
            <p class="text-gray-500">سجل الدخول لإدارة المتجر</p>
        </div>
        <form id="admin-login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold mb-2">اسم المستخدم</label>
                <input type="text" id="username" class="w-full bg-gray-50 border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all" required>
            </div>
            <div class="relative">
                <label class="block text-sm font-bold mb-2">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full bg-gray-50 border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all" required>
                    <button type="button" onclick="togglePassword('password', this)" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-orange-600 focus:outline-none">
                        <span class="material-symbols-outlined text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-bold text-center mb-4"></div>
            <button type="submit" id="submit-btn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95">
                دخول المسؤول
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-gray-400 text-sm hover:text-orange-600 transition-colors">العودة للموقع</a>
        </div>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">refresh</span> جاري التحقق...';

            try {
                const res = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('mazaki_admin_token', data.token);
                    localStorage.setItem('mazaki_admin_user', JSON.stringify(data.admin));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.innerText = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                    errorDiv.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'دخول المسؤول';
                }
            } catch (err) {
                errorDiv.innerText = 'حدث خطأ في الاتصال بالسيرفر';
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = 'دخول المسؤول';
            }
        });
    </script>
</body>
</html>
